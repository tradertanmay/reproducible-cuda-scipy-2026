# ── The workspace: your development environment ────────────────────────────
# One workspace, two source packages built from ./src:
#   * cuda-brot    — CUDA C++ via the pixi-build-cmake backend
#   * cutile-brot  — Python/cuTile via the pixi-build-python backend
# One fractal, two backends.
[workspace]
name = "combined-cuda-build"
channels = ["https://prefix.dev/conda-forge"]
# Declare that this platform provides a CUDA driver (the `__cuda` virtual
# package). This is what lets the solver pick GPU-enabled builds.
platforms = [{ platform = "linux-64", cuda = "13" }, { platform = "win-64", cuda = "13" }]
preview = ["pixi-build"]

[dependencies]
# Depend on both of our own packages as source dependencies: `pixi run` and
# `pixi install` will (re)build each one automatically when its sources change.
cuda-brot = { path = "src/cuda-brot" }
cutile-brot = { path = "src/cutile-brot" }

# ── Tasks: run either example from the one workspace ───────────────────────
[tasks.cuda-brot]
cmd = "cuda-brot"
description = "Render the classic Mandelbrot set (CUDA C++)"

[tasks.cuda-seahorse]
cmd = "cuda-brot -0.743643887 0.131825904 0.00008 1500"
description = "Deep zoom into seahorse valley (CUDA C++)"

[tasks.cutile-brot]
cmd = "cutile-brot"
description = "Render a GPU Mandelbrot set in the terminal (cuTile)"

[tasks.cutile-seahorse]
cmd = "cutile-brot --center-re -0.743643887 --center-im 0.131825904 --span 0.00008 --max-iter 1500"
description = "Deep zoom into seahorse valley (cuTile)"

# Pin which CUDA compiler package the build backend resolves
# `compilers = ["cuda"]` to. On conda-forge, CUDA 12+ compilers live in
# the `cuda-nvcc` packages.
[workspace.build-variants]
cuda_compiler = ["cuda-nvcc"]
cuda_compiler_version = ["13.1"]
